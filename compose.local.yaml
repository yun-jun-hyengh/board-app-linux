services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: board-app-container
    volumes:
      - ./src:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
  
  nginx:
    image: nginx:latest
    container_name: nginx-container
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src:/var/www/html
    depends_on:
      - php